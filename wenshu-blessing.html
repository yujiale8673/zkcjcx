<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="format-detection" content="telephone=no">
<title>文殊菩萨护佑 - 中考祈福</title>
<style>
:root{--blue:#0e3a6b;--blue-dark:#092847;--bg:#f0f2f5;--text:#333;--gold:#c8960c}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei","微软雅黑",Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
.header{background:linear-gradient(180deg,var(--blue) 0%,var(--blue-dark) 100%);color:#fff;text-align:center;padding:28px 16px 22px;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 50% 30%,rgba(255,255,255,.06) 0%,transparent 70%);pointer-events:none}
.header .emblem{width:50px;height:50px;margin:0 auto 10px;display:block;position:relative;z-index:1}
.header h1{font-size:22px;font-weight:600;letter-spacing:2px;position:relative;z-index:1;font-family:"STSongti-SC","Songti SC","SimSun","宋体",serif}
.header .notice-bar{background:rgba(255,255,255,.12);border-radius:4px;padding:6px 14px;font-size:12px;margin-top:10px;display:inline-block;position:relative;z-index:1}
.main{flex:1;padding:20px 16px 30px;max-width:500px;width:100%;margin:0 auto}
.bless-card{background:#fff;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.08);overflow:hidden}
.bless-img{text-align:center;padding:30px 16px 10px;background:linear-gradient(180deg,#fff8e7 0%,#fff3d0 40%,#fef5e7 100%);position:relative;overflow:hidden}
.bless-img::before{content:'';position:absolute;top:50%;left:50%;width:300px;height:300px;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(255,200,50,.15) 0%,rgba(255,200,50,.06) 40%,transparent 70%);pointer-events:none}
.bless-img img{width:100%;max-width:320px;position:relative;z-index:1}
.bless-title{text-align:center;font-size:20px;font-weight:700;color:#8b4513;letter-spacing:2px;padding:4px 16px;font-family:"STSongti-SC","Songti SC","SimSun","宋体",serif;position:relative;z-index:1}
.bless-text{padding:12px 24px 24px;text-align:center;line-height:2.2}
.bless-text .big{font-size:22px;font-weight:700;color:#8b0000;letter-spacing:2px;font-family:"STSongti-SC","Songti SC","SimSun","宋体",serif;margin-bottom:8px}
.bless-text .msg{font-size:15px;color:#5d4037;letter-spacing:1px}
.bless-text .msg .hl{font-weight:700;color:#b71c1c;font-size:16px}
.footer{background:#e8eaed;text-align:center;padding:16px;font-size:12px;color:#999;line-height:1.8;border-top:1px solid #ddd;margin-top:auto}
.footer .divider{margin:0 6px;color:#ccc}
@media(max-width:480px){.header{padding:20px 12px 16px}.header h1{font-size:18px}.header .emblem{width:40px;height:40px}.bless-img{padding:20px 12px 8px}.bless-img img{max-width:260px}.bless-text .big{font-size:18px}.bless-text .msg{font-size:13px}}
</style>
</head>
<body>

<div class="header">
  <svg class="emblem" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="48" fill="none" stroke="#fff" stroke-width="3" opacity=".9"/>
    <text x="50" y="62" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" font-family="serif">教育</text>
    <rect x="28" y="25" width="44" height="28" rx="3" fill="none" stroke="#fff" stroke-width="2.5"/>
    <line x1="28" y1="33" x2="72" y2="33" stroke="#fff" stroke-width="1.5"/>
    <rect x="38" y="36" width="24" height="12" rx="2" fill="#fff" opacity=".8"/>
  </svg>
  <h1>新疆维吾尔自治区教育考试院</h1>
  <div class="notice-bar">2026年初中学业水平考试 祈福专区</div>
</div>

<div class="main">
  <div class="bless-card">
    <div class="bless-img">
      <img src="wenshu.png" alt="文殊菩萨">
    </div>
    <div class="bless-title">文殊菩萨护佑 智慧增长</div>
    <div class="bless-text">
      <div class="big">🌸 恭喜你，你真的很棒！</div>
      <div class="msg">
        不要紧张，<span class="hl">不要内耗</span>。<br>
        你付出的每一分努力，都不会白费。<br>
        成绩只是数字，而你远不止于此。<br>
        <span class="hl">你一定能考好！</span><br>
        愿文殊菩萨的智慧之剑，斩断一切烦恼与焦虑。<br>
        愿你的未来，星光璀璨，金榜题名。
      </div>
    </div>
  </div>
</div>

<div class="footer">
  主办：新疆维吾尔自治区教育考试院<span class="divider">|</span>承办：新疆教育信息技术中心<br>
  地址：乌鲁木齐市天山区新民路25号<span class="divider">|</span>邮编：830002<br>
  Copyright &copy; 2026 新疆维吾尔自治区教育考试院 版权所有
</div>

</body>
</html>
